# ACE Dialer — nginx site config for the dialer server (172.16.46.50).
#
# Install:
#   sudo cp nginx-dialer.conf /etc/nginx/sites-available/dialer
#   sudo ln -sf /etc/nginx/sites-available/dialer /etc/nginx/sites-enabled/dialer
#   sudo nginx -t && sudo systemctl reload nginx
#
# Topology: the proxy server (192.168.1.95) fronts dialer.aptask.com and
# forwards to this nginx. TLS can terminate at the proxy OR here. Either
# way, the proxy MUST forward `Host: dialer.aptask.com` and
# `X-Forwarded-Proto: https` so the webhooks service builds correct
# absolute TexML/voicemail action URLs.
#
# Routing:
#   /            -> web SPA static files (apps/web/dist)
#   /api/        -> api service      :3000  (prefix STRIPPED)
#   /webhooks/   -> webhooks service :3002  (prefix KEPT)
#   /texml/      -> webhooks service :3002  (prefix KEPT — TexML callbacks)
#   /socket.io/  -> socket service   :3001  (WebSocket)

server {
    listen 80;
    server_name dialer.aptask.com;

    # --- change to your checkout path ---
    root /home/aptask/acedialerv4/apps/web/dist;
    index index.html;

    # Generous body size for MMS / voicemail-greeting uploads (api caps at 16MB).
    client_max_body_size 20m;

    # SPA: every non-asset path falls back to index.html so the React
    # router can handle deep links (/auth/microsoft/callback, /voicemail/...).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — strip the /api prefix. The api service routes are /auth/...,
    # /calls/..., etc. (no /api prefix), and the frontend calls
    # https://dialer.aptask.com/api/... so the trailing slash on
    # proxy_pass rewrites /api/auth/login -> /auth/login.
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Telnyx webhooks — KEEP the path. Routes are /webhooks/telnyx/calls etc.
    location /webhooks/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Telnyx TexML action callbacks — same webhooks service, KEEP the path.
    location /texml/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Realtime socket (Phase 0 stub today; ready for Presence/DND later).
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
    }
}
