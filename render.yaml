# Render Blueprint for the ACE Dialer 2.0 backend.
# Render reads this file when you connect the repo and creates the services automatically.

services:
  # ----- HTTP API -----
  - type: web
    name: ace-dialer-api
    runtime: node
    region: virginia
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build:api
    startCommand: npm start -w apps/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # Required env vars to set in the Render dashboard (Environment tab):
      #   DATABASE_URL         — Supabase Transaction Pooler URL (port 6543)
      #   DIRECT_DATABASE_URL  — Supabase Direct URL (port 5432) — for prisma db push
      #   JWT_SECRET           — any random 32+ char string
      #   ALLOWED_ORIGINS      — comma-separated client origins

  # ----- Real-time WebSocket -----
  - type: web
    name: ace-dialer-socket
    runtime: node
    region: virginia
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build:socket
    startCommand: npm start -w apps/socket
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # ----- Telnyx Webhooks -----
  - type: web
    name: ace-dialer-webhooks
    runtime: node
    region: virginia
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build:webhooks
    startCommand: npm start -w apps/webhooks
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
