name: Build desktop installers

permissions:
  # Needed so softprops/action-gh-release can create / update a release
  # via the built-in GITHUB_TOKEN without requiring a personal access token.
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - '.github/workflows/build-desktop.yml'
      # v0.9.12 — also rebuild when only the API or DB changed but a version
      # bump was committed. This catches cases where we ship an API-only fix
      # via `npm version` (which bumps every package.json including
      # apps/web + apps/desktop) and want the desktop installer to also
      # advance. Without this, desktop users get stuck on an older version
      # while web/API auto-deploys to Render with newer code.
      - 'package.json'
      - '**/package.json'
    # v0.9.12 — ALSO trigger on any tag push starting with `v`. Releases
    # are tagged from PowerShell (git tag vX.Y.Z + git push origin vX.Y.Z),
    # so a tag push is a strong signal that we want a fresh installer.
    tags:
      - 'v*'
  workflow_dispatch: # allow manual trigger from GitHub UI

# Build the .dmg (macOS) and .exe (Windows) installers in parallel.
# Mac runs on macos-latest (Apple Silicon by default — produces both arm64
# and x64 dmg via electron-builder's --arch x64,arm64 config).
# Windows runs on windows-latest.
jobs:
  mac:
    name: Build macOS .dmg
    runs-on: macos-latest
    # v0.10.109 - hard cap on the whole Mac job. Apple notarytool occasionally
    # hangs (TCP connection alive, no response). Without a job-level timeout,
    # GitHub waits the default 6 hours before killing the runner, blocking
    # subsequent builds. 35 minutes covers the 3-attempt retry loop with the
    # per-attempt timeout below.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Build web app
        working-directory: apps/web
        run: npm run build
      - name: Build desktop TS
        working-directory: apps/desktop
        run: npm run build
      # v0.10.23 — Mac packaging with retry + unnotarized fallback.
      #
      # Apple's notarytool API (appstoreconnect.apple.com/notary/v2/submissions)
      # has been intermittently failing — NSURLError -1001 timeouts and
      # -1005 dropped connections on consecutive builds. Notarization is
      # entirely on Apple's side; we can't fix the network. So we:
      #   1. Try the FULL signed + notarized build up to 3 times with 60s
      #      sleep between attempts.
      #   2. If all 3 attempts still fail, fall through to a SIGNED-ONLY
      #      build (no APPLE_* env vars → electron-builder skips notarization).
      #
      # End-user impact:
      #   • Notarized path (the happy case): zero Gatekeeper warnings.
      #   • Signed-only fallback: Mac users right-click → Open the first
      #     time; macOS remembers thereafter. Far better than no installer.
      #
      # The fallback runs ONLY when the retried step has outcome == 'failure'.
      - name: Package macOS .dmg (signed + notarized) with retry
        id: package_mac_signed
        working-directory: apps/desktop
        # v0.10.109 - per-step timeout. 10 min/attempt * 3 attempts + sleeps
        # fits inside the 35-min job cap and the fallback step.
        timeout-minutes: 30
        # electron-builder reads these env vars automatically:
        #   CSC_LINK / CSC_KEY_PASSWORD  → signing identity (.p12)
        #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID → notarize
        env:
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.APPLE_CSC_LINK == '' && 'false' || 'true' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3 — notarized build"
            npm run package:mac:publish
            rc=$?
            echo "::endgroup::"
            if [ $rc -eq 0 ]; then
              echo "✅ Notarized build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Attempt $attempt failed (exit $rc), sleeping 60s before retry..."
              sleep 60
            fi
          done
          echo "❌ All 3 notarized attempts failed — fallback step will package unnotarized."
          exit 1

      - name: Fallback — Package macOS .dmg (signed-only, no notarization)
        if: steps.package_mac_signed.outcome == 'failure'
        working-directory: apps/desktop
        # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID intentionally
        # OMITTED here. electron-builder skips notarization when they're
        # missing. The .dmg is still SIGNED via CSC_LINK so most install
        # checks pass; only the strictest Gatekeeper rule (notarization
        # ticket) is missing. Users right-click → Open the first time.
        env:
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.APPLE_CSC_LINK == '' && 'false' || 'true' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⚠️ Apple notarization unavailable — building signed-only fallback."
          npm run package:mac:publish
      - name: Upload .dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ace-dialer-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error
          retention-days: 30


  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    # v0.10.23 — REMOVED `needs: mac`. Apple's notarytool API has been
    # intermittently flaky (timeouts / connection drops on the
    # appstoreconnect.apple.com endpoint), causing Mac builds to fail
    # mid-flight. When Mac fails, `needs: mac` skipped this Windows job
    # too — blocking ALL desktop installers from updating. Windows
    # builds are completely independent of Mac signing/notarization,
    # so let them run in parallel. The "duplicate release draft" risk
    # the old comment warned about is now mitigated by softprops/
    # action-gh-release upserting on the tag.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Build web app
        working-directory: apps/web
        run: npm run build
      - name: Build desktop TS
        working-directory: apps/desktop
        run: npm run build
      - name: Package Windows .exe
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # electron-builder needs this to create the GH Release and upload
          # the .exe + latest.yml + blockmap for auto-update.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:win:publish
      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ace-dialer-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
          if-no-files-found: error
          retention-days: 30

