name: Build desktop installers

permissions:
  # Needed so softprops/action-gh-release can create / update a release
  # via the built-in GITHUB_TOKEN without requiring a personal access token.
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch: # allow manual trigger from GitHub UI

# Build the .dmg (macOS) and .exe (Windows) installers in parallel.
# Mac runs on macos-latest (Apple Silicon by default — produces both arm64
# and x64 dmg via electron-builder's --arch x64,arm64 config).
# Windows runs on windows-latest.
jobs:
  mac:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Build web app
        working-directory: apps/web
        run: npm run build
      - name: Build desktop TS
        working-directory: apps/desktop
        run: npm run build
      - name: Package macOS .dmg (signed + notarized)
        working-directory: apps/desktop
        # electron-builder reads these env vars automatically:
        #   CSC_LINK / CSC_KEY_PASSWORD  → signing identity (.p12)
        #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID → notarize
        # When all five secrets are present, the .dmg is signed AND notarized
        # so end users get zero Gatekeeper warnings on install. When ANY of the
        # secrets are absent (e.g. on a PR from a fork), CSC_IDENTITY_AUTO_DISCOVERY
        # falls back to 'false' so the build still completes — just unsigned.
        env:
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.APPLE_CSC_LINK == '' && 'false' || 'true' }}
          # electron-builder needs this to create the GH Release and upload
          # the .dmg + latest-mac.yml + blockmap so installed apps can
          # auto-update via electron-updater. GITHUB_TOKEN is provided by
          # the workflow context (we set contents: write at the top).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:mac:publish
      - name: Upload .dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ace-dialer-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error
          retention-days: 30


  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Build web app
        working-directory: apps/web
        run: npm run build
      - name: Build desktop TS
        working-directory: apps/desktop
        run: npm run build
      - name: Package Windows .exe
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # electron-builder needs this to create the GH Release and upload
          # the .exe + latest.yml + blockmap for auto-update.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:win:publish
      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ace-dialer-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
          if-no-files-found: error
          retention-days: 30

